# LotusWorks ADC6120 HAT — ALSA virtual devices
#
# LW_ADC_Stereo  : both XLR inputs, interleaved stereo (XLR1=left, XLR2=right)
# LW_ADC_Mono_1  : XLR1 only, mono
# LW_ADC_Mono_2  : XLR2 only, mono
#
# Dual-mono (XLR1 and XLR2 as separate mono files) is handled by lw-record.

pcm.LW_ADC_Stereo {
    type plug
    slave {
        pcm "hw:LotusWorksADC61"
        channels 2
    }
}

pcm.LW_ADC_Mono_1 {
    type route
    slave {
        pcm "hw:LotusWorksADC61"
        channels 2
    }
    ttable.0.0 1
}

pcm.LW_ADC_Mono_2 {
    type route
    slave {
        pcm "hw:LotusWorksADC61"
        channels 2
    }
    ttable.0.1 1
}
